<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventTimes - Panel admina</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --border: #e6e9ef;
      --text: #151a23;
      --muted: #687386;
      --primary: #1f6feb;
      --primary-hover: #1558be;
      --danger: #d92d20;
      --danger-hover: #b42318;
      --success: #15803d;
      --success-hover: #11662f;
      --soft: #eef2f7;
      --soft-hover: #e4e9f1;
      --warning: #f59e0b;
      --shadow: 0 12px 32px rgba(18, 25, 38, 0.12);
      --radius: 18px;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    #topbar {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 1200;
      width: min(500px, calc(100vw - 28px));
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(230, 233, 239, 0.9);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 16px;
      max-height: calc(100vh - 28px);
      overflow-y: auto;
    }

    #topbar h1 {
      margin: 0 0 6px 0;
      font-size: 24px;
      line-height: 1.1;
    }

    #topbar p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    #topbar-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .topbar-btn,
    .btn {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn {
      width: 100%;
    }

    .primary-btn,
    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .primary-btn:hover,
    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .secondary-btn,
    .btn-soft {
      background: var(--soft);
      color: #1d2939;
    }

    .secondary-btn:hover,
    .btn-soft:hover {
      background: var(--soft-hover);
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: var(--success-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .btn-warning {
      background: var(--warning);
      color: white;
    }

    .active-mode {
      background: var(--success) !important;
      color: white !important;
    }

    #status-badge {
      margin-top: 12px;
      display: none;
      font-size: 13px;
      font-weight: 700;
      color: white;
      background: var(--success);
      border-radius: 999px;
      padding: 8px 12px;
      width: fit-content;
    }

    .search-box {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .search-title {
      margin: 0 0 10px 0;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .input,
    .select {
      width: 100%;
      border: 1px solid #d7dde7;
      border-radius: 12px;
      padding: 12px 13px;
      font-size: 14px;
      background: white;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .input:focus,
    .select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(31, 111, 235, 0.12);
    }

    .helper {
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
      margin-top: -2px;
    }

    .search-results {
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .search-result {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #fbfcfe;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .search-result:hover {
      background: #f3f7ff;
      border-color: #cfdaf5;
    }

    .search-result-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 6px;
    }

    .search-result-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .search-empty {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      background: #fafcff;
      border: 1px dashed #cfd7e4;
      border-radius: 14px;
      padding: 12px;
    }

    .autocomplete-wrap {
      position: relative;
    }

    .autocomplete-list {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      z-index: 1600;
      overflow: hidden;
      display: none;
      max-height: 220px;
      overflow-y: auto;
    }

    .autocomplete-item {
      padding: 11px 12px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid #f0f2f6;
    }

    .autocomplete-item:last-child {
      border-bottom: none;
    }

    .autocomplete-item:hover {
      background: #f4f8ff;
    }

    #sidebar {
      position: absolute;
      top: 0;
      right: 0;
      width: 35vw;
      min-width: 380px;
      max-width: 650px;
      height: 100vh;
      background: var(--panel);
      border-left: 1px solid var(--border);
      box-shadow: -14px 0 34px rgba(18, 25, 38, 0.14);
      z-index: 1300;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #sidebar-header {
      padding: 20px 20px 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    #sidebar-title-wrap {
      min-width: 0;
    }

    #sidebar-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      word-break: break-word;
    }

    #sidebar-subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    #close-sidebar {
      border: none;
      background: var(--soft);
      color: #111827;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #close-sidebar:hover {
      background: var(--soft-hover);
    }

    #sidebar-content {
      padding: 18px 20px 26px 20px;
      overflow-y: auto;
      flex: 1;
    }

    .section {
      margin-bottom: 22px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .card {
      background: #fbfcfe;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .place-meta {
      display: grid;
      gap: 10px;
    }

    .meta-row {
      display: grid;
      gap: 4px;
    }

    .meta-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .meta-value {
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
    }

    .button-row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
      margin-top: 12px;
    }

    .button-row.single {
      grid-template-columns: 1fr;
    }

    .event-list {
      display: grid;
      gap: 12px;
    }

    .event-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: white;
      overflow: hidden;
    }

    .event-image-wrap {
      width: 100%;
      height: 180px;
      background: #f3f5f9;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .event-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .event-image-placeholder {
      padding: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .event-body {
      padding: 14px;
    }

    .event-name {
      margin: 0 0 10px 0;
      font-size: 18px;
      line-height: 1.25;
      word-break: break-word;
    }

    .event-meta-list {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .event-meta-item {
      font-size: 14px;
      line-height: 1.45;
      color: #2a3240;
    }

    .event-meta-item strong {
      color: #111827;
    }

    .preview-card {
      border: 1px dashed #cfd7e4;
      border-radius: 16px;
      background: #fafcff;
      padding: 12px;
    }

    .preview-image {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 12px;
      display: none;
      margin-top: 10px;
      border: 1px solid var(--border);
      background: #f3f5f9;
    }

    .preview-message {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .empty-state {
      padding: 18px;
      border: 1px dashed #cfd7e4;
      border-radius: 16px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      background: #fafcff;
    }

    .editing-box {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #d8deea;
    }

    @media (max-width: 980px) {
      #sidebar {
        width: 100vw;
        min-width: 0;
        max-width: none;
      }

      #topbar {
        width: calc(100vw - 28px);
        max-width: none;
      }

      .two-col,
      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="topbar">
    <h1>EventTimes</h1>
    <p>
      Panel admina. Dodawaj miejsca, edytuj eventy i wyszukuj po miejscu, mieście, rodzaju oraz dacie.
    </p>

    <div id="topbar-buttons">
      <button id="toggle-add-pin-btn" class="topbar-btn primary-btn">Dodaj pinezkę</button>
      <button id="close-sidebar-btn" class="topbar-btn secondary-btn">Zamknij panel</button>
    </div>

    <div id="status-badge">Tryb dodawania pinezki jest aktywny</div>

    <div class="search-box">
      <div class="search-title">Wyszukiwarka eventów</div>

      <div class="form-grid">
        <div class="autocomplete-wrap">
          <input id="searchEventName" class="input" placeholder="Nazwa eventu" autocomplete="off" />
          <div id="searchEventSuggestions" class="autocomplete-list"></div>
        </div>

        <input id="searchPlaceName" class="input" placeholder="Nazwa miejsca / pineski" />
        <input id="searchCity" class="input" placeholder="Miasto" />

        <select id="searchEventType" class="select">
          <option value="">Wszystkie rodzaje eventów</option>
          <option value="Gala MMA">Gala MMA</option>
          <option value="Koncert">Koncert</option>
          <option value="Stand-up">Stand-up</option>
        </select>

        <input id="searchExactDate" class="input" type="date" />

        <div class="two-col">
          <input id="searchDateFrom" class="input" type="date" />
          <input id="searchDateTo" class="input" type="date" />
        </div>

        <select id="searchSort" class="select">
          <option value="date_asc">Sortuj: data rosnąco</option>
          <option value="date_desc">Sortuj: data malejąco</option>
          <option value="name_asc">Sortuj: nazwa A-Z</option>
        </select>

        <div class="button-row">
          <button id="run-search-btn" class="btn btn-primary">Szukaj</button>
          <button id="clear-search-btn" class="btn btn-soft">Wyczyść</button>
        </div>
      </div>

      <div id="searchResults" class="search-results"></div>
    </div>
  </div>

  <div id="map"></div>

  <aside id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-title-wrap">
        <h2 id="sidebar-title">EventTimes</h2>
        <div id="sidebar-subtitle">Wybierz pineskę albo dodaj nowe miejsce.</div>
      </div>
      <button id="close-sidebar" type="button">&times;</button>
    </div>

    <div id="sidebar-content"></div>
  </aside>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA7ioFOQKTjZt6VGJ9aDCJ6te2SsDERsvo",
      authDomain: "eventtimes-ed063.firebaseapp.com",
      projectId: "eventtimes-ed063",
      storageBucket: "eventtimes-ed063.firebasestorage.app",
      messagingSenderId: "497749838930",
      appId: "1:497749838930:web:9bdef298a34e5ccbdb638b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const EVENT_TYPES = ["Gala MMA", "Koncert", "Stand-up"];
    const DUPLICATE_RADIUS_METERS = 35;

    const map = L.map("map").setView([52.0, 19.0], 6);

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const markers = {};
    let addPinMode = false;
    let selectedPlaceId = null;
    let allPlacesCache = [];

    const sidebar = document.getElementById("sidebar");
    const sidebarTitle = document.getElementById("sidebar-title");
    const sidebarSubtitle = document.getElementById("sidebar-subtitle");
    const sidebarContent = document.getElementById("sidebar-content");
    const toggleAddPinBtn = document.getElementById("toggle-add-pin-btn");
    const closeSidebarBtn = document.getElementById("close-sidebar-btn");
    const closeSidebarX = document.getElementById("close-sidebar");
    const statusBadge = document.getElementById("status-badge");
    const searchResults = document.getElementById("searchResults");
    const searchEventNameInput = document.getElementById("searchEventName");
    const searchPlaceNameInput = document.getElementById("searchPlaceName");
    const searchCityInput = document.getElementById("searchCity");
    const searchEventTypeInput = document.getElementById("searchEventType");
    const searchExactDateInput = document.getElementById("searchExactDate");
    const searchDateFromInput = document.getElementById("searchDateFrom");
    const searchDateToInput = document.getElementById("searchDateTo");
    const searchSortInput = document.getElementById("searchSort");
    const searchSuggestionsBox = document.getElementById("searchEventSuggestions");

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function normalizeString(value) {
      return (value || "")
        .toString()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function formatDate(dateString) {
      if (!dateString) return "Brak daty";
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return dateString;
      const day = String(date.getDate()).padStart(2, "0");
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const year = date.getFullYear();
      return `${day}.${month}.${year}`;
    }

    function setAddPinMode(isActive) {
      addPinMode = isActive;

      if (addPinMode) {
        toggleAddPinBtn.classList.add("active-mode");
        toggleAddPinBtn.textContent = "Anuluj dodawanie";
        statusBadge.style.display = "inline-block";
        map.getContainer().style.cursor = "crosshair";
      } else {
        toggleAddPinBtn.classList.remove("active-mode");
        toggleAddPinBtn.textContent = "Dodaj pinezkę";
        statusBadge.style.display = "none";
        map.getContainer().style.cursor = "";
      }
    }

    function openSidebar(title, subtitle, html) {
      sidebarTitle.textContent = title;
      sidebarSubtitle.textContent = subtitle;
      sidebarContent.innerHTML = html;
      sidebar.classList.add("open");
    }

    function closeSidebar() {
      sidebar.classList.remove("open");
      selectedPlaceId = null;
    }

    function buildEventTypeOptions(selectedValue = "") {
      let html = '<option value="">Wybierz rodzaj eventu</option>';

      EVENT_TYPES.forEach(function(type) {
        const selected = type === selectedValue ? "selected" : "";
        html += `<option value="${escapeHtml(type)}" ${selected}>${escapeHtml(type)}</option>`;
      });

      return html;
    }

    function normalizePlace(doc) {
      const data = doc.data() || {};

      let lat = data.lat;
      let lng = data.lng;

      if ((lat === undefined || lng === undefined) && typeof data.coords === "string") {
        const parts = data.coords.split(",");
        if (parts.length === 2) {
          lat = parseFloat(parts[0]);
          lng = parseFloat(parts[1]);
        }
      }

      if (typeof lat !== "number" || typeof lng !== "number" || isNaN(lat) || isNaN(lng)) {
        return null;
      }

      return {
        id: doc.id,
        placeName: data.placeName || "",
        city: data.city || "",
        street: data.street || "",
        lat: lat,
        lng: lng,
        events: Array.isArray(data.events)
          ? data.events.map(function(item) {
              return {
                name: item.name || "",
                type: item.type || "",
                date: item.date || "",
                imageUrl: item.imageUrl || item.image || ""
              };
            })
          : Array.isArray(data.list)
            ? data.list.map(function(item) {
                if (typeof item === "string") {
                  return {
                    name: item,
                    type: "",
                    date: "",
                    imageUrl: ""
                  };
                }
                return {
                  name: item.name || "",
                  type: item.type || "",
                  date: item.date || "",
                  imageUrl: item.imageUrl || item.image || ""
                };
              })
            : []
      };
    }

    function rebuildPlacesCache() {
      allPlacesCache = Object.values(markers).map(function(marker) {
        return marker.placeData;
      });
    }

    function findNearbyPlace(latlng) {
      let closest = null;

      Object.values(markers).forEach(function(marker) {
        const markerLatLng = marker.getLatLng();
        const distance = latlng.distanceTo(markerLatLng);

        if (distance <= DUPLICATE_RADIUS_METERS) {
          if (!closest || distance < closest.distance) {
            closest = {
              placeId: marker.placeData.id,
              distance: distance
            };
          }
        }
      });

      return closest;
    }

    function buildAddPlacePanel(lat, lng) {
      return `
        <div class="section">
          <div class="section-title">Nowa pineska</div>
          <div class="card">
            <div class="form-grid">
              <input id="placeNameInput" class="input" placeholder="Nazwa miejsca" />
              <input id="cityInput" class="input" placeholder="Miasto" />
              <input id="streetInput" class="input" placeholder="Ulica" />
              <div class="helper">
                Pineska zapisze się jako osobne miejsce z własnym ID. Eventy dodasz później z poziomu tego miejsca.
              </div>
              <button class="btn btn-primary" onclick="addPlace(${lat}, ${lng})">Zapisz pineszkę</button>
              <button class="btn btn-soft" onclick="cancelAddPlace()">Anuluj</button>
            </div>
          </div>
        </div>
      `;
    }

    function buildPlaceEditPanel(placeData) {
      return `
        <div class="editing-box">
          <div class="form-grid">
            <input id="editPlaceNameInput" class="input" value="${escapeHtml(placeData.placeName)}" placeholder="Nazwa miejsca" />
            <input id="editPlaceCityInput" class="input" value="${escapeHtml(placeData.city)}" placeholder="Miasto" />
            <input id="editPlaceStreetInput" class="input" value="${escapeHtml(placeData.street)}" placeholder="Ulica" />

            <div class="button-row">
              <button class="btn btn-success" onclick="savePlaceEdit('${placeData.id}')">Zapisz miejsce</button>
              <button class="btn btn-soft" onclick="renderPlaceSidebarById('${placeData.id}')">Anuluj</button>
            </div>
          </div>
        </div>
      `;
    }

    function buildEventEditPanel(placeId, eventIndex, eventItem) {
      return `
        <div class="editing-box">
          <div class="form-grid">
            <input id="editEventName-${eventIndex}" class="input" value="${escapeHtml(eventItem.name)}" placeholder="Nazwa eventu" />

            <select id="editEventType-${eventIndex}" class="select">
              ${buildEventTypeOptions(eventItem.type || "")}
            </select>

            <input id="editEventDate-${eventIndex}" class="input" type="date" value="${escapeHtml(eventItem.date || "")}" />

            <input
              id="editEventImage-${eventIndex}"
              class="input"
              value="${escapeHtml(eventItem.imageUrl || "")}"
              placeholder="Link do grafiki eventu (URL)"
            />

            <div class="button-row">
              <button class="btn btn-success" onclick="saveEventEdit('${placeId}', ${eventIndex})">Zapisz event</button>
              <button class="btn btn-soft" onclick="renderPlaceSidebarById('${placeId}')">Anuluj</button>
            </div>
          </div>
        </div>
      `;
    }

    function buildPlaceDetailsPanel(placeData) {
      const placeName = placeData?.placeName || "Bez nazwy miejsca";
      const city = placeData?.city || "Brak";
      const street = placeData?.street || "Brak";
      const events = Array.isArray(placeData?.events) ? placeData.events : [];
      const placeId = placeData.id;

      let eventsHtml = "";

      if (events.length === 0) {
        eventsHtml = `
          <div class="empty-state">
            To miejsce nie ma jeszcze żadnych eventów. Dodaj pierwszy event w formularzu poniżej.
          </div>
        `;
      } else {
        eventsHtml = `<div class="event-list">`;

        events.forEach(function(eventItem, index) {
          const imageUrl = eventItem.imageUrl ? escapeHtml(eventItem.imageUrl) : "";
          const eventName = escapeHtml(eventItem.name || "Bez nazwy");
          const eventType = escapeHtml(eventItem.type || "Brak");
          const eventDate = escapeHtml(formatDate(eventItem.date || ""));

          eventsHtml += `
            <div class="event-card">
              <div class="event-image-wrap">
                ${
                  imageUrl
                    ? `<img src="${imageUrl}" alt="${eventName}" onerror="this.parentElement.innerHTML='<div class=&quot;event-image-placeholder&quot;>Nie udało się wczytać grafiki.</div>';">`
                    : `<div class="event-image-placeholder">Brak grafiki dla tego eventu.</div>`
                }
              </div>

              <div class="event-body">
                <h3 class="event-name">${eventName}</h3>

                <div class="event-meta-list">
                  <div class="event-meta-item"><strong>Rodzaj:</strong> ${eventType}</div>
                  <div class="event-meta-item"><strong>Data:</strong> ${eventDate}</div>
                </div>

                <div class="button-row">
                  <button class="btn btn-warning" onclick="startEditEvent('${placeId}', ${index})">Edytuj event</button>
                  <button class="btn btn-danger" onclick="deleteEvent('${placeId}', ${index})">Usuń event</button>
                </div>

                <div id="eventEditBox-${index}"></div>
              </div>
            </div>
          `;
        });

        eventsHtml += `</div>`;
      }

      return `
        <div class="section">
          <div class="section-title">Dane miejsca</div>
          <div class="card place-meta">
            <div class="meta-row">
              <div class="meta-label">Nazwa miejsca</div>
              <div class="meta-value">${escapeHtml(placeName)}</div>
            </div>

            <div class="meta-row">
              <div class="meta-label">Miasto</div>
              <div class="meta-value">${escapeHtml(city)}</div>
            </div>

            <div class="meta-row">
              <div class="meta-label">Ulica</div>
              <div class="meta-value">${escapeHtml(street)}</div>
            </div>

            <div class="meta-row">
              <div class="meta-label">Współrzędne</div>
              <div class="meta-value">${placeData.lat.toFixed(5)}, ${placeData.lng.toFixed(5)}</div>
            </div>

            <div class="button-row single">
              <button class="btn btn-warning" onclick="startEditPlace('${placeId}')">Edytuj miejsce</button>
            </div>

            <div id="placeEditBox"></div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Lista eventów</div>
          ${eventsHtml}
        </div>

        <div class="section">
          <div class="section-title">Dodaj nowy event</div>
          <div class="card">
            <div class="form-grid">
              <input id="eventNameInput" class="input" placeholder="Nazwa eventu" />

              <select id="eventTypeInput" class="select">
                ${buildEventTypeOptions()}
              </select>

              <input id="eventDateInput" class="input" type="date" />

              <input
                id="eventImageInput"
                class="input"
                placeholder="Link do grafiki eventu (URL)"
                oninput="updateImagePreview()"
              />

              <div class="preview-card">
                <div class="preview-message">
                  Wklej link do plakatu, logo albo grafiki promocyjnej. Jeśli link działa, podgląd pokaże się niżej.
                </div>
                <img id="eventImagePreview" class="preview-image" alt="Podgląd grafiki eventu" />
                <div id="eventImageError" class="helper" style="display:none; color:#b42318; margin-top:10px;">
                  Nie udało się wczytać grafiki z tego linku.
                </div>
              </div>

              <button class="btn btn-primary" onclick="addEvent('${placeId}')">Dodaj event</button>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Usuwanie</div>
          <button class="btn btn-danger" onclick="deleteMarker('${placeId}')">
            Usuń całą pineskę
          </button>
        </div>
      `;
    }

    function renderPlaceSidebar(placeData) {
      selectedPlaceId = placeData.id;
      openSidebar(
        placeData.placeName || "Miejsce",
        "Tutaj zarządzasz eventami przypisanymi do tej pineski.",
        buildPlaceDetailsPanel(placeData)
      );

      setTimeout(function() {
        bindPreviewHandlers();
      }, 0);
    }

    function renderPlaceSidebarById(placeId) {
      if (!markers[placeId]) return;
      renderPlaceSidebar(markers[placeId].placeData);
    }

    function startEditPlace(placeId) {
      const place = markers[placeId] ? markers[placeId].placeData : null;
      if (!place) return;

      const box = document.getElementById("placeEditBox");
      if (!box) return;

      box.innerHTML = buildPlaceEditPanel(place);
    }

    function startEditEvent(placeId, eventIndex) {
      const place = markers[placeId] ? markers[placeId].placeData : null;
      if (!place || !place.events[eventIndex]) return;

      renderPlaceSidebar(place);

      setTimeout(function() {
        const box = document.getElementById(`eventEditBox-${eventIndex}`);
        if (!box) return;
        box.innerHTML = buildEventEditPanel(placeId, eventIndex, place.events[eventIndex]);
      }, 0);
    }

    function bindPreviewHandlers() {
      const input = document.getElementById("eventImageInput");
      const preview = document.getElementById("eventImagePreview");
      const error = document.getElementById("eventImageError");

      if (!input || !preview || !error) return;

      preview.onerror = function() {
        preview.style.display = "none";
        error.style.display = "block";
      };

      preview.onload = function() {
        preview.style.display = "block";
        error.style.display = "none";
      };
    }

    function updateImagePreview() {
      const input = document.getElementById("eventImageInput");
      const preview = document.getElementById("eventImagePreview");
      const error = document.getElementById("eventImageError");

      if (!input || !preview || !error) return;

      const value = input.value.trim();

      if (!value) {
        preview.style.display = "none";
        preview.removeAttribute("src");
        error.style.display = "none";
        return;
      }

      error.style.display = "none";
      preview.style.display = "none";
      preview.src = value;
    }

    function renderMarker(placeData) {
      const coords = [placeData.lat, placeData.lng];

      if (markers[placeData.id]) {
        markers[placeData.id].placeData = placeData;
        markers[placeData.id].setLatLng(coords);
        rebuildPlacesCache();
        return;
      }

      const marker = L.marker(coords).addTo(map);
      marker.placeData = placeData;

      marker.on("click", function() {
        renderPlaceSidebar(marker.placeData);
      });

      markers[placeData.id] = marker;
      rebuildPlacesCache();
    }

    async function loadPlaces() {
      try {
        const snapshot = await db.collection("places").get();

        snapshot.forEach(function(doc) {
          const placeData = normalizePlace(doc);
          if (!placeData) return;
          renderMarker(placeData);
        });

        rebuildPlacesCache();
        refreshEventNameSuggestions();
      } catch (error) {
        console.error("Błąd loadPlaces:", error);
        alert("Nie udało się wczytać miejsc.");
      }
    }

    async function addPlace(lat, lng) {
      try {
        const placeNameInput = document.getElementById("placeNameInput");
        const cityInput = document.getElementById("cityInput");
        const streetInput = document.getElementById("streetInput");

        const placeName = placeNameInput ? placeNameInput.value.trim() : "";
        const city = cityInput ? cityInput.value.trim() : "";
        const street = streetInput ? streetInput.value.trim() : "";

        if (!placeName) {
          alert("Wpisz nazwę miejsca.");
          return;
        }

        const nearby = findNearbyPlace(L.latLng(lat, lng));
        if (nearby) {
          alert("Bardzo blisko istnieje już pineska. Kliknij istniejące miejsce zamiast tworzyć nowe.");
          return;
        }

        const placePayload = {
          placeName: placeName,
          city: city,
          street: street,
          lat: lat,
          lng: lng,
          events: [],
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        const docRef = await db.collection("places").add(placePayload);

        const placeData = {
          id: docRef.id,
          ...placePayload
        };

        renderMarker(placeData);
        setAddPinMode(false);
        refreshEventNameSuggestions();
        renderPlaceSidebar(placeData);
      } catch (error) {
        console.error("Błąd addPlace:", error);
        alert("Nie udało się dodać pineski.");
      }
    }

    async function addEvent(placeId) {
      try {
        const ref = db.collection("places").doc(placeId);
        const snap = await ref.get();

        if (!snap.exists) {
          alert("To miejsce nie istnieje.");
          return;
        }

        const placeData = normalizePlace(snap);
        if (!placeData) {
          alert("Nie udało się odczytać danych miejsca.");
          return;
        }

        const eventNameInput = document.getElementById("eventNameInput");
        const eventTypeInput = document.getElementById("eventTypeInput");
        const eventDateInput = document.getElementById("eventDateInput");
        const eventImageInput = document.getElementById("eventImageInput");

        const eventName = eventNameInput ? eventNameInput.value.trim() : "";
        const eventType = eventTypeInput ? eventTypeInput.value.trim() : "";
        const eventDate = eventDateInput ? eventDateInput.value : "";
        const eventImageUrl = eventImageInput ? eventImageInput.value.trim() : "";

        if (!eventName) {
          alert("Wpisz nazwę eventu.");
          return;
        }

        if (!eventType) {
          alert("Wybierz rodzaj eventu.");
          return;
        }

        if (!eventDate) {
          alert("Wybierz datę eventu.");
          return;
        }

        placeData.events.push({
          name: eventName,
          type: eventType,
          date: eventDate,
          imageUrl: eventImageUrl
        });

        await ref.update({
          events: placeData.events
        });

        markers[placeId].placeData = placeData;
        rebuildPlacesCache();
        refreshEventNameSuggestions();
        renderPlaceSidebar(placeData);
      } catch (error) {
        console.error("Błąd addEvent:", error);
        alert("Nie udało się dodać eventu.");
      }
    }

    async function savePlaceEdit(placeId) {
      try {
        const ref = db.collection("places").doc(placeId);
        const snap = await ref.get();

        if (!snap.exists) {
          alert("To miejsce nie istnieje.");
          return;
        }

        const placeData = normalizePlace(snap);
        if (!placeData) {
          alert("Nie udało się odczytać miejsca.");
          return;
        }

        const placeName = document.getElementById("editPlaceNameInput").value.trim();
        const city = document.getElementById("editPlaceCityInput").value.trim();
        const street = document.getElementById("editPlaceStreetInput").value.trim();

        if (!placeName) {
          alert("Nazwa miejsca nie może być pusta.");
          return;
        }

        await ref.update({
          placeName: placeName,
          city: city,
          street: street
        });

        placeData.placeName = placeName;
        placeData.city = city;
        placeData.street = street;

        markers[placeId].placeData = placeData;
        rebuildPlacesCache();
        renderPlaceSidebar(placeData);
        runSearch();
      } catch (error) {
        console.error("Błąd savePlaceEdit:", error);
        alert("Nie udało się zapisać miejsca.");
      }
    }

    async function saveEventEdit(placeId, eventIndex) {
      try {
        const ref = db.collection("places").doc(placeId);
        const snap = await ref.get();

        if (!snap.exists) {
          alert("To miejsce nie istnieje.");
          return;
        }

        const placeData = normalizePlace(snap);
        if (!placeData) {
          alert("Nie udało się odczytać miejsca.");
          return;
        }

        if (!placeData.events[eventIndex]) {
          alert("Nie znaleziono eventu.");
          return;
        }

        const name = document.getElementById(`editEventName-${eventIndex}`).value.trim();
        const type = document.getElementById(`editEventType-${eventIndex}`).value.trim();
        const date = document.getElementById(`editEventDate-${eventIndex}`).value;
        const imageUrl = document.getElementById(`editEventImage-${eventIndex}`).value.trim();

        if (!name) {
          alert("Nazwa eventu nie może być pusta.");
          return;
        }

        if (!type) {
          alert("Wybierz rodzaj eventu.");
          return;
        }

        if (!date) {
          alert("Wybierz datę eventu.");
          return;
        }

        placeData.events[eventIndex] = {
          name: name,
          type: type,
          date: date,
          imageUrl: imageUrl
        };

        await ref.update({
          events: placeData.events
        });

        markers[placeId].placeData = placeData;
        rebuildPlacesCache();
        refreshEventNameSuggestions();
        renderPlaceSidebar(placeData);
        runSearch();
      } catch (error) {
        console.error("Błąd saveEventEdit:", error);
        alert("Nie udało się zapisać eventu.");
      }
    }

    async function deleteEvent(placeId, eventIndex) {
      try {
        const confirmed = confirm("Na pewno usunąć ten event?");
        if (!confirmed) return;

        const ref = db.collection("places").doc(placeId);
        const snap = await ref.get();

        if (!snap.exists) {
          alert("To miejsce już nie istnieje.");
          return;
        }

        const placeData = normalizePlace(snap);
        if (!placeData) {
          alert("Nie udało się odczytać danych miejsca.");
          return;
        }

        if (eventIndex < 0 || eventIndex >= placeData.events.length) {
          alert("Nieprawidłowy event.");
          return;
        }

        placeData.events.splice(eventIndex, 1);

        await ref.update({
          events: placeData.events
        });

        markers[placeId].placeData = placeData;
        rebuildPlacesCache();
        refreshEventNameSuggestions();
        renderPlaceSidebar(placeData);
        runSearch();
      } catch (error) {
        console.error("Błąd deleteEvent:", error);
        alert("Nie udało się usunąć eventu.");
      }
    }

    async function deleteMarker(placeId) {
      try {
        const confirmed = confirm("Na pewno usunąć całą pineskę i wszystkie eventy?");
        if (!confirmed) return;

        await db.collection("places").doc(placeId).delete();

        if (markers[placeId]) {
          map.removeLayer(markers[placeId]);
          delete markers[placeId];
        }

        rebuildPlacesCache();
        refreshEventNameSuggestions();
        closeSidebar();
        runSearch();
      } catch (error) {
        console.error("Błąd deleteMarker:", error);
        alert("Nie udało się usunąć pineski.");
      }
    }

    function cancelAddPlace() {
      setAddPinMode(false);
      closeSidebar();
    }

    function getAllEventNames() {
      const names = new Set();

      allPlacesCache.forEach(function(place) {
        (place.events || []).forEach(function(eventItem) {
          if (eventItem.name && eventItem.name.trim()) {
            names.add(eventItem.name.trim());
          }
        });
      });

      return Array.from(names).sort(function(a, b) {
        return a.localeCompare(b, "pl");
      });
    }

    function refreshEventNameSuggestions() {
      const query = searchEventNameInput.value.trim();
      const allNames = getAllEventNames();

      if (!query) {
        searchSuggestionsBox.style.display = "none";
        searchSuggestionsBox.innerHTML = "";
        return;
      }

      const normalizedQuery = normalizeString(query);

      const matches = allNames.filter(function(name) {
        const n = normalizeString(name);
        return n.startsWith(normalizedQuery) || n.includes(normalizedQuery);
      }).slice(0, 8);

      if (matches.length === 0) {
        searchSuggestionsBox.style.display = "none";
        searchSuggestionsBox.innerHTML = "";
        return;
      }

      searchSuggestionsBox.innerHTML = matches.map(function(name) {
        return `<div class="autocomplete-item" onclick="applyEventSuggestion('${escapeHtml(name).replace(/'/g, "\\'")}')">${escapeHtml(name)}</div>`;
      }).join("");

      searchSuggestionsBox.style.display = "block";
    }

    function applyEventSuggestion(value) {
      searchEventNameInput.value = value;
      searchSuggestionsBox.style.display = "none";
      runSearch();
    }

    function isDateInRange(eventDate, exactDate, dateFrom, dateTo) {
      if (!eventDate) return false;

      if (exactDate) {
        return eventDate === exactDate;
      }

      if (dateFrom && eventDate < dateFrom) return false;
      if (dateTo && eventDate > dateTo) return false;

      return true;
    }

    function runSearch() {
      const eventNameQuery = normalizeString(searchEventNameInput.value);
      const placeNameQuery = normalizeString(searchPlaceNameInput.value);
      const cityQuery = normalizeString(searchCityInput.value);
      const eventTypeQuery = normalizeString(searchEventTypeInput.value);
      const exactDate = searchExactDateInput.value;
      const dateFrom = searchDateFromInput.value;
      const dateTo = searchDateToInput.value;
      const sortMode = searchSortInput.value;

      let results = [];

      allPlacesCache.forEach(function(place) {
        const placeNameNorm = normalizeString(place.placeName);
        const cityNorm = normalizeString(place.city);

        (place.events || []).forEach(function(eventItem, index) {
          const eventNameNorm = normalizeString(eventItem.name);
          const eventTypeNorm = normalizeString(eventItem.type);

          if (eventNameQuery && !eventNameNorm.includes(eventNameQuery)) return;
          if (placeNameQuery && !placeNameNorm.includes(placeNameQuery)) return;
          if (cityQuery && !cityNorm.includes(cityQuery)) return;
          if (eventTypeQuery && eventTypeNorm !== eventTypeQuery) return;

          if (exactDate || dateFrom || dateTo) {
            if (!isDateInRange(eventItem.date || "", exactDate, dateFrom, dateTo)) return;
          }

          results.push({
            placeId: place.id,
            eventIndex: index,
            placeName: place.placeName || "Bez nazwy miejsca",
            city: place.city || "Brak miasta",
            street: place.street || "Brak ulicy",
            lat: place.lat,
            lng: place.lng,
            eventName: eventItem.name || "Bez nazwy eventu",
            eventType: eventItem.type || "Brak rodzaju",
            eventDate: eventItem.date || "",
            eventImageUrl: eventItem.imageUrl || ""
          });
        });
      });

      results.sort(function(a, b) {
        if (sortMode === "date_desc") {
          return (b.eventDate || "").localeCompare(a.eventDate || "");
        }

        if (sortMode === "name_asc") {
          return a.eventName.localeCompare(b.eventName, "pl");
        }

        return (a.eventDate || "").localeCompare(b.eventDate || "");
      });

      renderSearchResults(results);
    }

    function renderSearchResults(results) {
      if (
        !searchEventNameInput.value.trim() &&
        !searchPlaceNameInput.value.trim() &&
        !searchCityInput.value.trim() &&
        !searchEventTypeInput.value.trim() &&
        !searchExactDateInput.value &&
        !searchDateFromInput.value &&
        !searchDateToInput.value
      ) {
        searchResults.innerHTML = "";
        return;
      }

      if (results.length === 0) {
        searchResults.innerHTML = `
          <div class="search-empty">
            Brak wyników dla podanych filtrów.
          </div>
        `;
        return;
      }

      searchResults.innerHTML = results.map(function(item) {
        return `
          <div class="search-result" onclick="openSearchResult('${item.placeId}', ${item.eventIndex})">
            <div class="search-result-title">${escapeHtml(item.eventName)}</div>
            <div class="search-result-meta">
              <strong>Miejsce:</strong> ${escapeHtml(item.placeName)}<br>
              <strong>Miasto:</strong> ${escapeHtml(item.city)}<br>
              <strong>Rodzaj:</strong> ${escapeHtml(item.eventType)}<br>
              <strong>Data:</strong> ${escapeHtml(formatDate(item.eventDate))}
            </div>
          </div>
        `;
      }).join("");
    }

    function openSearchResult(placeId, eventIndex) {
      const marker = markers[placeId];
      if (!marker) return;

      map.flyTo([marker.placeData.lat, marker.placeData.lng], 14, {
        animate: true,
        duration: 0.8
      });

      renderPlaceSidebar(marker.placeData);

      setTimeout(function() {
        const eventCards = document.querySelectorAll(".event-card");
        const targetCard = eventCards[eventIndex];
        if (targetCard) {
          targetCard.scrollIntoView({ behavior: "smooth", block: "start" });
          targetCard.style.outline = "3px solid rgba(31,111,235,0.35)";
          setTimeout(function() {
            targetCard.style.outline = "";
          }, 1800);
        }
      }, 250);
    }

    function clearSearch() {
      searchEventNameInput.value = "";
      searchPlaceNameInput.value = "";
      searchCityInput.value = "";
      searchEventTypeInput.value = "";
      searchExactDateInput.value = "";
      searchDateFromInput.value = "";
      searchDateToInput.value = "";
      searchSortInput.value = "date_asc";
      searchResults.innerHTML = "";
      searchSuggestionsBox.style.display = "none";
      searchSuggestionsBox.innerHTML = "";
    }

    toggleAddPinBtn.addEventListener("click", function() {
      setAddPinMode(!addPinMode);

      if (!addPinMode) {
        closeSidebar();
      }
    });

    closeSidebarBtn.addEventListener("click", function() {
      closeSidebar();
    });

    closeSidebarX.addEventListener("click", function() {
      closeSidebar();
    });

    map.on("click", function(e) {
      if (!addPinMode) return;

      const nearby = findNearbyPlace(e.latlng);
      if (nearby) {
        alert("W tym miejscu albo bardzo blisko jest już pineska.");
        return;
      }

      openSidebar(
        "Nowe miejsce",
        "Uzupełnij dane pineski i zapisz miejsce na mapie.",
        buildAddPlacePanel(e.latlng.lat, e.latlng.lng)
      );
    });

    document.getElementById("run-search-btn").addEventListener("click", runSearch);
    document.getElementById("clear-search-btn").addEventListener("click", clearSearch);

    [
      searchPlaceNameInput,
      searchCityInput,
      searchEventTypeInput,
      searchExactDateInput,
      searchDateFromInput,
      searchDateToInput,
      searchSortInput
    ].forEach(function(el) {
      el.addEventListener("input", runSearch);
      el.addEventListener("change", runSearch);
    });

    searchEventNameInput.addEventListener("input", function() {
      refreshEventNameSuggestions();
      runSearch();
    });

    document.addEventListener("click", function(e) {
      if (!searchSuggestionsBox.contains(e.target) && e.target !== searchEventNameInput) {
        searchSuggestionsBox.style.display = "none";
      }
    });

    window.addPlace = addPlace;
    window.addEvent = addEvent;
    window.deleteEvent = deleteEvent;
    window.deleteMarker = deleteMarker;
    window.cancelAddPlace = cancelAddPlace;
    window.updateImagePreview = updateImagePreview;
    window.startEditPlace = startEditPlace;
    window.savePlaceEdit = savePlaceEdit;
    window.startEditEvent = startEditEvent;
    window.saveEventEdit = saveEventEdit;
    window.renderPlaceSidebarById = renderPlaceSidebarById;
    window.runSearch = runSearch;
    window.applyEventSuggestion = applyEventSuggestion;
    window.openSearchResult = openSearchResult;

    loadPlaces();
  </script>
</body>
</html>
